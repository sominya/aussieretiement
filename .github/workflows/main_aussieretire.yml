# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - aussieretire

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies, build, and test
        run: |
          npm ci
          npm run test --if-present
          npm run build --if-present

      - name: Prepare standalone deployment artifact
        run: |
          mkdir -p deploy/.next
          cp -R .next/standalone/. deploy/
          cp -R .next/static deploy/.next/static
          cp -R public deploy/public
          cat > deploy/package.json <<'EOF'
          {
            "name": "aussieretire-ai-standalone",
            "private": true,
            "scripts": {
              "start": "node server.js"
            }
          }
          EOF

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: deploy
      
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'aussieretire'
          slot-name: 'Production'
          package: deploy
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_E8BF2BAC73DB4F9E89987A447DF18283 }}